id: subread
name: Subread / featureCounts
version: "2.1.1"
category: rnaseq_align
stage: [rnaseq_deg.step2]
input_types: [bam, annotation_gtf]
output_types: [count_matrix]
applicable:
  species: [any]
  read_type: [short]
  mode: [any]
container:
  image: quay.io/biocontainers/subread:2.1.1--h577a1d6_0
  pull_policy: if_not_present
  image_digest: sha256:a0f7ea960dd0f55240b330b5c4515388a493e266a7b427d6a59a39164bc14865
resources:
  min: {cpu: 2, ram_gb: 4, disk_gb: 10}
  recommended: {cpu: 16, ram_gb: 16, disk_gb: 50}
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  featureCounts -T {cpu} -a {annotation_gtf} -o {out_dir}/counts.tsv
                -p --countReadPairs -t exon -g gene_id {alignment_bams}
references: []
citation: "Liao 2014, PMID 24227677"
added: "2026-05-15"
last_reviewed: "2026-07-06"
source_repo: ShiLab-Bioinformatics/subread
