id: kallisto
name: kallisto
version: "0.51.1"
category: rnaseq_align
stage: [rnaseq_deg.step2]
input_types: [fastq_short_paired_clean, reference_genome]
output_types: [count_matrix]
applicable:
  species: [prokaryote, eukaryote, eukaryote_small]
  read_type: [short]
  mode: [any]
container:
  image: quay.io/biocontainers/kallisto:0.51.1--h6de1650_1
  pull_policy: if_not_present
resources:
  min:         { cpu: 2, ram_gb: 4,  disk_gb: 5 }
  recommended: { cpu: 8, ram_gb: 16, disk_gb: 20 }
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  kallisto index -i {out_dir}/kallisto_index {reference_genome} &&
  kallisto quant -i {out_dir}/kallisto_index -o {out_dir}
                 -t {cpu} {r1} {r2}
citation: "Bray 2016, PMID 27043002"
added: "2026-04-16"
last_reviewed: "2026-04-16"
