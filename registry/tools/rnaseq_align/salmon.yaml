id: salmon
name: Salmon
version: "2.3.3"
category: rnaseq_align
stage: [rnaseq_deg.step2]
input_types: [fastq_short_paired_clean, reference_genome, annotation_gtf]
output_types: [count_matrix]
applicable:
  species: [prokaryote, eukaryote, eukaryote_small]
  read_type: [short]
  mode: [any]
container:
  image: quay.io/biocontainers/salmon:2.3.3--hfa8f182_0
  pull_policy: if_not_present
  image_digest: sha256:5942663cf6bf5dfe6db86d66cc5d0913a621b74f5a0a522a951c744b96e10d67
resources:
  min: {cpu: 4, ram_gb: 8, disk_gb: 10}
  recommended: {cpu: 16, ram_gb: 32, disk_gb: 30}
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  salmon index -t {reference_genome} -i {out_dir}/salmon_index --threads {cpu} &&
  salmon quant -i {out_dir}/salmon_index -l A
               -1 {r1} -2 {r2}
               --threads {cpu} --validateMappings
               -o {out_dir}
citation: "Patro 2017, PMID 28263959"
added: "2026-04-16"
last_reviewed: "2026-07-14"
source_repo: COMBINE-lab/salmon
