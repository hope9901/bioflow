id: rsem
name: RSEM
version: "1.3.3"
category: rnaseq_align
stage: [rnaseq_deg.step2]
input_types: [bam, transcripts_fasta]
output_types: [count_matrix, transcript_abundance]
applicable:
  species: [eukaryote, eukaryote_small, prokaryote]
  read_type: [short]
  mode: [any]
container:
  image: quay.io/biocontainers/rsem:1.3.3--pl5321ha04c180_8
  pull_policy: if_not_present
resources:
  min:         { cpu: 4,  ram_gb: 8,  disk_gb: 20 }
  recommended: { cpu: 16, ram_gb: 32, disk_gb: 100 }
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  rsem-calculate-expression --paired-end -p {cpu}
       --alignments {transcriptome_bam} {rsem_ref} {out_dir}/{sample_id}
references: []
citation: "Li & Dewey 2011, PMID 21816040"
added: "2026-05-15"
last_reviewed: "2026-05-15"
source_repo: deweylab/RSEM
