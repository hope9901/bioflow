id: stringtie
name: StringTie
version: "2.2.3"
category: rnaseq_align
stage: [rnaseq_deg.step2]
input_types: [bam, annotation_gtf]
output_types: [transcripts_gtf, count_matrix]
applicable:
  species: [eukaryote, eukaryote_small]
  read_type: [short, long_ont, long_hifi]
  mode: [any]
container:
  image: quay.io/biocontainers/stringtie:2.2.3--h29c0135_1
  pull_policy: if_not_present
  image_digest: sha256:84207eb013dbcff90928d8ddc75902580d3885ce8edaa36b8fab7665a3dc2e3c
resources:
  min: {cpu: 2, ram_gb: 8, disk_gb: 10}
  recommended: {cpu: 16, ram_gb: 32, disk_gb: 100}
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  stringtie {alignment_bam} -G {annotation_gtf}
            -o {out_dir}/transcripts.gtf -p {cpu} -e -B
references: []
citation: "Pertea 2015, PMID 25690850"
added: "2026-05-15"
last_reviewed: "2026-05-15"
source_repo: gpertea/stringtie
