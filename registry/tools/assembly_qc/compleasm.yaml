id: compleasm
name: compleasm
version: "0.2.8"
category: assembly_qc
stage: [genome_assembly.step3]
input_types: [assembly_fasta]
output_types: [busco_report, completeness_summary]
applicable:
  species: [any]
  read_type: [any]
  mode: [any]
container:
  image: quay.io/biocontainers/compleasm:0.2.8--pyh106432d_0
  pull_policy: if_not_present
  image_digest: sha256:47eb19702983cf216fd123044e9986d6b419d728ba677a9f7db45874ebdc8be4
resources:
  min: {cpu: 4, ram_gb: 8, disk_gb: 20}
  recommended: {cpu: 32, ram_gb: 32, disk_gb: 100}
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  compleasm run -a {assembly_fasta} -o {out_dir}
                -l {busco_lineage} -L {busco_db} -t {cpu}
references: []
citation: "Huang & Li 2023, PMID 37758247"
added: "2026-05-15"
last_reviewed: "2026-07-06"
source_repo: huangnengCSU/compleasm
