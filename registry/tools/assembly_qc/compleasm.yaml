id: compleasm
name: compleasm
version: "0.2.6"
category: assembly_qc
stage: [genome_assembly.step3]
input_types: [assembly_fasta]
output_types: [busco_report, completeness_summary]
applicable:
  species: [any]
  read_type: [any]
  mode: [any]
container:
  image: quay.io/biocontainers/compleasm:0.2.6--pyh7cba7a3_0
  pull_policy: if_not_present
resources:
  min:         { cpu: 4,  ram_gb: 8,  disk_gb: 20 }
  recommended: { cpu: 32, ram_gb: 32, disk_gb: 100 }
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  compleasm run -a {assembly_fasta} -o {out_dir}
                -l {busco_lineage} -L {busco_db} -t {cpu}
references: []
citation: "Huang & Li 2023, PMID 37862556"
added: "2026-05-15"
last_reviewed: "2026-05-15"
source_repo: huangnengCSU/compleasm
