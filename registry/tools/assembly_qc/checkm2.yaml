id: checkm2
name: CheckM2
version: "1.0.2"
category: assembly_qc
stage: [genome_assembly.step3]
input_types: [assembly_fasta]
output_types: [assembly_qc_report]
applicable:
  species: [prokaryote]
  read_type: [any]
  mode: [any]
container:
  image: quay.io/biocontainers/checkm2:1.0.2--pyh7cba7a3_0
  pull_policy: if_not_present
resources:
  min:         { cpu: 4,  ram_gb: 8,  disk_gb: 10 }
  recommended: { cpu: 16, ram_gb: 32, disk_gb: 20 }
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  checkm2 predict --input {assembly_fasta} --output-directory {out_dir}
                  --threads {cpu} --force
references: ["/refs/dbs/checkm2"]
citation: "Chklovski 2023, PMID 37501070"
added: "2026-04-16"
last_reviewed: "2026-04-16"
