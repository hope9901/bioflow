id: merqury
name: Merqury
version: "1.3"
category: assembly_qc
stage: [genome_assembly.step3]
input_types: [assembly_fasta, fastq_short_paired_clean]
output_types: [assembly_qc_report]
applicable:
  species: [eukaryote, eukaryote_small]
  read_type: [short, long_hifi, hybrid]
  mode: [de_novo]
container:
  image: quay.io/biocontainers/merqury:1.3--hdfd78af_1
  pull_policy: if_not_present
resources:
  min:         { cpu: 4,  ram_gb: 16, disk_gb: 20 }
  recommended: { cpu: 16, ram_gb: 64, disk_gb: 100 }
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  merqury.sh {out_dir}/read.meryl {assembly_fasta} {sample_id}
citation: "Rhie 2020, PMID 33025931"
added: "2026-04-16"
last_reviewed: "2026-04-16"
