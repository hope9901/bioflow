id: quast
name: QUAST
version: "5.2.0"
category: assembly_qc
stage: [genome_assembly.step3]
input_types: [assembly_fasta]
output_types: [assembly_qc_report, assembly_qc_tsv]
applicable:
  species: [any]
  read_type: [any]
  mode: [any]
container:
  image: staphb/quast:5.2.0
  pull_policy: if_not_present
resources:
  min:         { cpu: 1, ram_gb: 2, disk_gb: 2 }
  recommended: { cpu: 4, ram_gb: 8, disk_gb: 10 }
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  quast.py -o {out_dir} -t {cpu} {assembly_fasta}
citation: "Mikheenko 2018, PMID 29949969"
added: "2026-04-16"
last_reviewed: "2026-04-16"
