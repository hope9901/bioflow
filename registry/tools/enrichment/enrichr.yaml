id: enrichr
name: Enrichr (via gseapy)
version: "1.1.3"
category: enrichment
stage: [rnaseq_deg.step4]
input_types: [gene_list]
output_types: [enrichment_report]
applicable:
  species: [any]
  read_type: [any]
  mode: [any]
container:
  image: quay.io/biocontainers/gseapy:1.1.3--py310h30d9df9_0
  pull_policy: if_not_present
resources:
  min:         { cpu: 1, ram_gb: 4, disk_gb: 5 }
  recommended: { cpu: 4, ram_gb: 8, disk_gb: 10 }
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  python -c "import gseapy as gp;
             gl = open('{gene_list}').read().splitlines();
             enr = gp.enrichr(gene_list=gl, gene_sets='{libraries}',
                              organism='{organism}', outdir='{out_dir}')"
references: []
citation: "Kuleshov 2016, PMID 27141961"
added: "2026-05-15"
last_reviewed: "2026-05-15"
source_repo: zqfang/GSEApy
