id: gseapy
name: GSEApy
version: "1.3.0"
category: enrichment
stage: [rnaseq_deg.step4]
input_types: [deg_table, gene_set_gmt]
output_types: [enrichment_report, gsea_plots]
applicable:
  species: [any]
  read_type: [any]
  mode: [any]
container:
  image: quay.io/biocontainers/gseapy:1.3.0--py311heb3b1e3_0
  pull_policy: if_not_present
  image_digest: sha256:2e3edf3b41d9d011880985756b0e61c7882d8b5e04d037732ccb58f29286bd53
resources:
  min: {cpu: 2, ram_gb: 8, disk_gb: 10}
  recommended: {cpu: 8, ram_gb: 16, disk_gb: 30}
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  python -c "import gseapy; gseapy.prerank(rnk='{rnk_file}',
             gene_sets='{gene_sets}', outdir='{out_dir}',
             threads={cpu})"
references: []
citation: "Fang 2023, PMID 36426870"
