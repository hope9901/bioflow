id: gseapy
name: GSEApy
version: "1.1.3"
category: enrichment
stage: [rnaseq_deg.step4]
input_types: [deg_table, gene_set_gmt]
output_types: [enrichment_report, gsea_plots]
applicable:
  species: [any]
  read_type: [any]
  mode: [any]
container:
  image: quay.io/biocontainers/gseapy:1.1.3--py311h5e00ca1_1
  pull_policy: if_not_present
  image_digest: sha256:d98e657c82073c3a092ec789d473ef7c0dc2ee5ccf523535e25d3e739925e723
resources:
  min: {cpu: 2, ram_gb: 8, disk_gb: 10}
  recommended: {cpu: 8, ram_gb: 16, disk_gb: 30}
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  python -c "import gseapy; gseapy.prerank(rnk='{rnk_file}',
             gene_sets='{gene_sets}', outdir='{out_dir}',
             threads={cpu})"
references: []
citation: "Fang 2023, PMID 36426870"
