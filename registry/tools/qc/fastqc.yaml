id: fastqc
name: FastQC
version: "0.12.1"
category: qc
stage:
  - genome_assembly.step1
  - rnaseq_deg.step1
input_types: [fastq_short_single, fastq_short_paired]
output_types: [qc_html, qc_zip]
applicable:
  species: [any]
  read_type: [short]
  mode: [any]
container:
  image: quay.io/biocontainers/fastqc:0.12.1--hdfd78af_0
  pull_policy: if_not_present
resources:
  min:         { cpu: 1, ram_gb: 1, disk_gb: 1 }
  recommended: { cpu: 4, ram_gb: 4, disk_gb: 5 }
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  fastqc -t {cpu} -o {out_dir} {inputs}
citation: "Andrews S, 2010 (Babraham Bioinformatics)"
added: "2026-04-16"
last_reviewed: "2026-04-16"
