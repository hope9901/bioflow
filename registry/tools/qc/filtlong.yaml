id: filtlong
name: Filtlong
version: "0.2.1"
category: qc
stage: [genome_assembly.step1]
input_types: [fastq_long]
output_types: [fastq_long_filtered]
applicable:
  species: [any]
  read_type: [long_hifi, long_ont]
  mode: [any]
container:
  image: quay.io/biocontainers/filtlong:0.2.1--hdcf5f25_4
  pull_policy: if_not_present
  image_digest: sha256:e6038605a5d350d0c20e798aa20e4de27018dd5b4db9d9cd3586393d805ea782
resources:
  min: {cpu: 1, ram_gb: 4, disk_gb: 5}
  recommended: {cpu: 4, ram_gb: 16, disk_gb: 20}
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  filtlong --min_length 1000 --keep_percent 95 {r1_long} |
  gzip > {out_dir}/filtered.fastq.gz
citation: "Wick 2021 (github.com/rrwick/Filtlong)"
added: "2026-04-16"
last_reviewed: "2026-04-16"
