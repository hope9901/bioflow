id: nanoplot
name: NanoPlot
version: "1.43.0"
category: qc
stage: [genome_assembly.step1]
input_types: [fastq_long]
output_types: [qc_html, qc_txt]
applicable:
  species: [any]
  read_type: [long_hifi, long_ont]
  mode: [any]
container:
  image: quay.io/biocontainers/nanoplot:1.43.0--pyhdfd78af_0
  pull_policy: if_not_present
resources:
  min:         { cpu: 2, ram_gb: 4,  disk_gb: 2 }
  recommended: { cpu: 8, ram_gb: 16, disk_gb: 5 }
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  NanoPlot --fastq {r1_long} --outdir {out_dir} --threads {cpu}
            --N50 --title {sample_id}
citation: "De Coster 2023, PMID 36939539"
added: "2026-04-16"
last_reviewed: "2026-04-16"
