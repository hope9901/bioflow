id: cutadapt
name: Cutadapt
version: "5.2"
category: qc
stage: [genome_assembly.step1, rnaseq_deg.step1, chip_seq.step1, atac_seq.step1]
input_types: [fastq_short_paired, fastq_short_single]
output_types: [fastq_short_paired_clean]
applicable:
  species: [any]
  read_type: [short]
  mode: [any]
container:
  image: quay.io/biocontainers/cutadapt:5.2--py312hfabe715_2
  pull_policy: if_not_present
  image_digest: sha256:741216fb9a56cdac2a61e93c64f857bc5b3e1f9f2c123cf7ae2c6ea5c97702d8
resources:
  min: {cpu: 2, ram_gb: 4, disk_gb: 5}
  recommended: {cpu: 8, ram_gb: 8, disk_gb: 20}
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  cutadapt -j {cpu} -a {adapter_r1} -A {adapter_r2}
           -o {out_dir}/clean_R1.fq.gz -p {out_dir}/clean_R2.fq.gz
           -q 20 -m 30 {r1} {r2}
references: []
citation: "Martin 2011, doi:10.14806/ej.17.1.200"
added: "2026-05-15"
last_reviewed: "2026-07-06"
source_repo: marcelm/cutadapt
