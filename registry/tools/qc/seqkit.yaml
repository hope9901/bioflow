id: seqkit
name: SeqKit
version: "2.8.2"
category: qc
stage: [utility.sequence_ops]
input_types: [fasta, fastq]
output_types: [fasta, fastq, stats_tsv]
applicable:
  species: [any]
  read_type: [any]
  mode: [any]
container:
  image: quay.io/biocontainers/seqkit:2.8.2--h9ee0642_0
  pull_policy: if_not_present
resources:
  min:         { cpu: 2, ram_gb: 4,  disk_gb: 5 }
  recommended: { cpu: 8, ram_gb: 16, disk_gb: 50 }
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  seqkit stats -a -j {cpu} {input_files} > {out_dir}/stats.tsv
references: []
citation: "Shen 2016, PMID 27706213"
added: "2026-05-15"
last_reviewed: "2026-05-15"
source_repo: shenwei356/seqkit
