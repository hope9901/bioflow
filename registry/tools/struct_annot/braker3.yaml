id: braker3
name: BRAKER3
version: "3.0.8"
category: struct_annot
stage: [genome_assembly.step5]
input_types: [masked_assembly_fasta, rnaseq_bam]
output_types: [structural_gff, protein_faa]
applicable:
  species: [eukaryote, eukaryote_small]
  read_type: [any]
  mode: [any]
container:
  image: teambraker/braker3:v3.0.8
  pull_policy: if_not_present
  image_digest: sha256:9cc53f0990f87c026c17a09893a3e8fb076f67504ac659ee8c5708318f451660
resources:
  min: {cpu: 8, ram_gb: 16, disk_gb: 30}
  recommended: {cpu: 32, ram_gb: 128, disk_gb: 100}
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  braker.pl --genome={assembly_fasta} --workingdir={out_dir}
            --threads={cpu} --species={sample_id}
            {rnaseq_bam_arg}
references: ["/refs/dbs/OrthoDB"]
citation: "Gabriel 2024, PMID 37739920"
added: "2026-04-16"
last_reviewed: "2026-04-16"
