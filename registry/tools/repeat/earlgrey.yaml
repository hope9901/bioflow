id: earlgrey
name: Earl Grey
version: "4.5.0"
category: repeat
stage: [genome_assembly.step4]
input_types: [assembly_fasta]
output_types: [masked_assembly_fasta, repeat_library]
applicable:
  species: [eukaryote, eukaryote_small]
  read_type: [any]
  mode: [any]
container:
  image: quay.io/biocontainers/earlgrey:4.5.0--hdfd78af_0
  pull_policy: if_not_present
resources:
  min:         { cpu: 8,  ram_gb: 16,  disk_gb: 50 }
  recommended: { cpu: 32, ram_gb: 64,  disk_gb: 200 }
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  earlGrey -g {assembly_fasta} -s {sample_id} -o {out_dir} -t {cpu}
           -r {repeat_species}
citation: "Baril 2024, PMID 38162708"
added: "2026-04-16"
last_reviewed: "2026-04-16"
