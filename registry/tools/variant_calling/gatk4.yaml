id: gatk4
name: GATK4
version: "4.6.1.0"
category: variant_calling
stage: [variant_calling.step2]
input_types: [bam, reference_fasta]
output_types: [vcf, gvcf]
applicable:
  species: [eukaryote, eukaryote_small, prokaryote]
  read_type: [short]
  mode: [resequencing]
container:
  image: quay.io/biocontainers/gatk4:4.6.1.0--py310hdfd78af_0
  pull_policy: if_not_present
  image_digest: sha256:42a736f8ce06092f50b77a2614318b52324e8862aa7517542ee95e8238b5105b
resources:
  min: {cpu: 4, ram_gb: 16, disk_gb: 50}
  recommended: {cpu: 16, ram_gb: 64, disk_gb: 200}
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  gatk HaplotypeCaller -R {reference_fasta} -I {input_bam}
       -O {out_dir}/{sample_id}.vcf.gz --native-pair-hmm-threads {cpu}
references: []
citation: "McKenna 2010, PMID 20644199"
added: "2026-05-15"
last_reviewed: "2026-05-15"
source_repo: broadinstitute/gatk
