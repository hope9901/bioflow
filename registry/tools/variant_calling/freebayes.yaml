id: freebayes
name: FreeBayes
version: "1.3.7"
category: variant_calling
stage: [variant_calling.step2]
input_types: [bam, reference_fasta]
output_types: [vcf]
applicable:
  species: [eukaryote, eukaryote_small, prokaryote]
  read_type: [short]
  mode: [resequencing]
container:
  image: quay.io/biocontainers/freebayes:1.3.7--h6a68c12_2
  pull_policy: if_not_present
  image_digest: sha256:283c973efd6f94c07ba3b952187fdac545ba1a6edb54589b10eae77877a36a36
resources:
  min: {cpu: 2, ram_gb: 8, disk_gb: 20}
  recommended: {cpu: 16, ram_gb: 32, disk_gb: 100}
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  freebayes -f {reference_fasta} {input_bam}
            > {out_dir}/{sample_id}.vcf
references: []
citation: "Garrison & Marth 2012, arXiv:1207.3907"
added: "2026-05-15"
