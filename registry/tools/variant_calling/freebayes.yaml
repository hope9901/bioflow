id: freebayes
name: FreeBayes
version: "1.3.10"
category: variant_calling
stage: [variant_calling.step2]
input_types: [bam, reference_fasta]
output_types: [vcf]
applicable:
  species: [eukaryote, eukaryote_small, prokaryote]
  read_type: [short]
  mode: [resequencing]
container:
  image: quay.io/biocontainers/freebayes:1.3.10--hbefcdb2_0
  pull_policy: if_not_present
  image_digest: sha256:b44701e5bd8f2bf2c5c94c74a63cd7e07e8b482ece174ebef062468228d068b1
resources:
  min: {cpu: 2, ram_gb: 8, disk_gb: 20}
  recommended: {cpu: 16, ram_gb: 32, disk_gb: 100}
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  freebayes -f {reference_fasta} {input_bam}
            > {out_dir}/{sample_id}.vcf
references: []
citation: "Garrison & Marth 2012, arXiv:1207.3907"
added: "2026-05-15"
last_reviewed: "2026-07-06"
source_repo: freebayes/freebayes
