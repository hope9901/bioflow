id: snpeff
name: SnpEff
version: "5.2"
category: variant_calling
stage: [variant_calling.step4]
input_types: [vcf]
output_types: [annotated_vcf, variant_report]
applicable:
  species: [eukaryote, eukaryote_small, prokaryote]
  read_type: [any]
  mode: [resequencing]
container:
  image: quay.io/biocontainers/snpeff:5.2--hdfd78af_1
  pull_policy: if_not_present
resources:
  min:         { cpu: 2, ram_gb: 8,  disk_gb: 20 }
  recommended: { cpu: 4, ram_gb: 16, disk_gb: 50 }
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  snpEff -Xmx{ram_gb}g {snpeff_db} {input_vcf}
         > {out_dir}/{sample_id}.annotated.vcf
references: []
citation: "Cingolani 2012, PMID 22728672"
added: "2026-05-15"
last_reviewed: "2026-05-15"
source_repo: pcingola/SnpEff
