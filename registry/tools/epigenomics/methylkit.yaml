id: methylkit
name: methylkit
version: "1.36.0"
category: epigenomics
stage: [methylation.step4]
input_types: [methylation_report]
output_types: [dmr_results]
applicable:
  species: [any]
  read_type: [short]
  mode: [wgbs, rrbs]
container:
  image: quay.io/biocontainers/bioconductor-methylkit:1.36.0--r45ha27e39d_0
  pull_policy: if_not_present
  image_digest: sha256:3bc5ec3aa01cc26a6437b8477829c19b31c6d906186cabf3fc1f73886131f621
resources:
  min: {cpu: 4, ram_gb: 16, disk_gb: 10}
  recommended: {cpu: 8, ram_gb: 32, disk_gb: 20}
  gpu: false
  arch: [x86_64]
command_template: |
  Rscript -e "
  library(methylKit);
  file.list<-as.list(strsplit('{methylation_files}',',')[[1]]);
  myobj<-methRead(file.list,
    sample.id=as.list(strsplit('{sample_ids}',',')[[1]]),
    assembly='{genome_build}',pipeline='bismarkCoverage',
    treatment=c(1,1,0,0),context='CpG');
  meth<-unite(myobj);
  myDiff<-calculateDiffMeth(meth,num.cores={cpu});
  write.csv(getMethylDiff(myDiff,difference=25,qvalue=0.01),
    '{out_dir}/dmr_results.csv')"
references: []
citation: "Akalin et al. 2012, PMID 23034086"
added: "2026-04-20"
last_reviewed: "2026-04-20"
