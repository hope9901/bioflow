id: cellranger
name: cellranger
version: "9.0.1"
category: single_cell
stage: [scrna_seq.step1]
input_types: [short_paired]
output_types: [count_matrix]
applicable:
  species: [eukaryote, eukaryote_small]
  read_type: [short]
  mode: [de_novo]
container:
  image: litd/docker-cellranger:v9.0.1
  pull_policy: if_not_present
  image_digest: sha256:eacffbbcf36bc80db9691d80628e0a0b410da1b1293c3465b80c9917fe4ec0f3
resources:
  min: {cpu: 16, ram_gb: 64, disk_gb: 100}
  recommended: {cpu: 32, ram_gb: 128, disk_gb: 500}
  gpu: false
  arch: [x86_64]
command_template: |
  cellranger count --id={sample_id} --transcriptome={cellranger_ref}
  --fastqs={fastq_dir} --sample={sample_id}
  --localcores={cpu} --localmem={ram_gb} --output-dir={out_dir}
references: []
citation: "Zheng et al. 2017, PMID 28091601"
added: "2026-04-20"
last_reviewed: "2026-07-06"
