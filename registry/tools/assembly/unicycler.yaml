id: unicycler
name: Unicycler
version: "0.5.1"
category: assembly
stage: [genome_assembly.step2]
input_types: [fastq_short_paired_clean, fastq_long]
output_types: [assembly_fasta, assembly_graph]
applicable:
  species: [prokaryote, eukaryote_small]
  read_type: [hybrid]
  mode: [de_novo]
container:
  image: quay.io/biocontainers/unicycler:0.5.1--py39hd65a603_1
  pull_policy: if_not_present
resources:
  min:         { cpu: 4,  ram_gb: 8,   disk_gb: 20 }
  recommended: { cpu: 16, ram_gb: 32,  disk_gb: 100 }
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  unicycler -1 {r1} -2 {r2} -l {r1_long} -o {out_dir} -t {cpu}
citation: "Wick 2017, PMID 28594827"
added: "2026-04-16"
last_reviewed: "2026-04-16"
