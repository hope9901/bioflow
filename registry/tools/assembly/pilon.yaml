id: pilon
name: Pilon
version: "1.24"
category: assembly
stage: [genome_assembly.step2]
input_types: [assembly_fasta, bam]
output_types: [polished_assembly_fasta]
applicable:
  species: [prokaryote, eukaryote, eukaryote_small]
  read_type: [short, hybrid]
  mode: [de_novo]
container:
  image: quay.io/biocontainers/pilon:1.24--hdfd78af_0
  pull_policy: if_not_present
  image_digest: sha256:54c025a97d0b8763b7668383d3efa353d3ecac3f114ca7f93bffe0e71c2f7877
resources:
  min: {cpu: 4, ram_gb: 16, disk_gb: 30}
  recommended: {cpu: 16, ram_gb: 64, disk_gb: 100}
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  pilon --genome {assembly_fasta} --frags {short_bam}
        --output {sample_id} --outdir {out_dir}
        --threads {cpu} --changes --vcf
references: []
citation: "Walker 2014, PMID 25409509"
added: "2026-05-15"
last_reviewed: "2026-05-15"
source_repo: broadinstitute/pilon
