id: raven
name: Raven
version: "1.8.1"
category: assembly
stage: [genome_assembly.step2]
input_types: [fastq_long_ont, fastq_long_pacbio]
output_types: [assembly_fasta]
applicable:
  species: [prokaryote, eukaryote_small]
  read_type: [long_ont, long_hifi]
  mode: [de_novo]
container:
  image: quay.io/biocontainers/raven-assembler:1.8.1--h43eeafb_3
  pull_policy: if_not_present
  image_digest: sha256:f4fb9dce3e189cdc0e74e5c3fa0d043e532c507e20e96f44a394a89c94438312
resources:
  min: {cpu: 4, ram_gb: 16, disk_gb: 30}
  recommended: {cpu: 16, ram_gb: 64, disk_gb: 100}
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  raven {long_reads} --threads {cpu}
        --graphical-fragment-assembly {out_dir}/assembly.gfa
        > {out_dir}/assembly.fasta
references: []
citation: "Vaser & Sikic 2021, PMID 38217213"
added: "2026-05-15"
last_reviewed: "2026-05-15"
source_repo: lbcb-sci/raven
