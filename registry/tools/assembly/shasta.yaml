id: shasta
name: Shasta
version: "0.14.0"
category: assembly
stage: [genome_assembly.step2]
input_types: [fastq_long_ont]
output_types: [assembly_fasta, assembly_graph]
applicable:
  species: [eukaryote, eukaryote_small]
  read_type: [long_ont]
  mode: [de_novo]
container:
  image: quay.io/biocontainers/shasta:0.14.0--h9948957_0
  pull_policy: if_not_present
  image_digest: sha256:6050673c4d9314a843956fe51f5609f37a0c55d5a644732b9dd5e807a562ca0e
resources:
  min: {cpu: 16, ram_gb: 64, disk_gb: 200}
  recommended: {cpu: 64, ram_gb: 512, disk_gb: 2000}
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  shasta --input {long_reads} --assemblyDirectory {out_dir}
         --threads {cpu} --config Nanopore-May2022
references: []
citation: "Shafin 2020, PMID 32686750"
added: "2026-05-15"
last_reviewed: "2026-07-06"
source_repo: paoloshasta/shasta
