id: nextdenovo
name: NextDenovo
version: "2.5.2"
category: assembly
stage: [genome_assembly.step2]
input_types: [fastq_long_ont, fastq_long_pacbio]
output_types: [assembly_fasta]
applicable:
  species: [prokaryote, eukaryote, eukaryote_small]
  read_type: [long_ont, long_hifi]
  mode: [de_novo]
container:
  image: quay.io/biocontainers/nextdenovo:2.5.2--py39h2add14b_3
  pull_policy: if_not_present
resources:
  min:         { cpu: 16, ram_gb: 64,  disk_gb: 200 }
  recommended: { cpu: 64, ram_gb: 256, disk_gb: 1000 }
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  nextDenovo {config_file}
references: []
citation: "Hu 2024, PMID 38630727"
added: "2026-05-15"
last_reviewed: "2026-05-15"
source_repo: Nextomics/NextDenovo
