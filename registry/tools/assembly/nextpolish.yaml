id: nextpolish
name: NextPolish
version: "1.4.1"
category: assembly
stage: [genome_assembly.step2]
input_types: [assembly_fasta, fastq_short_paired_clean, fastq_long_ont, fastq_long_hifi]
output_types: [polished_assembly_fasta]
applicable:
  species: [prokaryote, eukaryote, eukaryote_small]
  read_type: [short, long_ont, long_hifi, hybrid]
  mode: [de_novo]
container:
  image: quay.io/biocontainers/nextpolish:1.4.1--py39h7cff6ad_2
  pull_policy: if_not_present
resources:
  min:         { cpu: 8,  ram_gb: 16,  disk_gb: 50 }
  recommended: { cpu: 32, ram_gb: 128, disk_gb: 200 }
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  nextPolish {config_file}
references: []
citation: "Hu 2020, PMID 31504201"
added: "2026-05-15"
last_reviewed: "2026-05-15"
source_repo: Nextomics/NextPolish
