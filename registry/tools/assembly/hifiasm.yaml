id: hifiasm
name: hifiasm
version: "0.25.0"
category: assembly
stage: [genome_assembly.step2]
input_types: [fastq_long_hifi]
output_types: [assembly_fasta, assembly_gfa]
applicable:
  species: [prokaryote, eukaryote, eukaryote_small]
  read_type: [long_hifi]
  mode: [de_novo]
container:
  image: quay.io/biocontainers/hifiasm:0.25.0--h5ca1c30_0
  pull_policy: if_not_present
  image_digest: sha256:5dc4c88cabceb56445f44e785dae252e13fb8131e9bde54028bfb4102a3f424d
resources:
  min: {cpu: 8, ram_gb: 16, disk_gb: 50}
  recommended: {cpu: 32, ram_gb: 128, disk_gb: 300}
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  hifiasm -o {out_dir}/{sample_id} -t {cpu} {r1_long} &&
  awk '/^S/{{print ">"$2"\n"$3}}' {out_dir}/{sample_id}.bp.p_ctg.gfa \
      > {out_dir}/asm.bp.p_ctg.fa
citation: "Cheng 2021, PMID 33526886"
added: "2026-04-16"
last_reviewed: "2026-07-06"
source_repo: chhylp123/hifiasm
