id: masurca
name: MaSuRCA
version: "4.1.4"
category: assembly
stage: [genome_assembly.step2]
input_types: [fastq_short_paired_clean, fastq_long_ont, fastq_long_hifi]
output_types: [assembly_fasta]
applicable:
  species: [eukaryote, eukaryote_small]
  read_type: [hybrid, short]
  mode: [de_novo]
container:
  image: quay.io/biocontainers/masurca:4.1.4--ha5bb246_1
  pull_policy: if_not_present
  image_digest: sha256:91d2bfccf38e9861f9527a136b3ac7996681f57d59eb811ae9324f098691d3c6
resources:
  min: {cpu: 16, ram_gb: 64, disk_gb: 200}
  recommended: {cpu: 64, ram_gb: 512, disk_gb: 2000}
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  cd {out_dir} && masurca {config_file}
  && bash assemble.sh
references: []
citation: "Zimin 2017, PMID 28130360"
added: "2026-05-15"
last_reviewed: "2026-07-06"
source_repo: alekseyzimin/masurca
