id: spades
name: SPAdes
version: "4.0.0"
category: assembly
stage: [genome_assembly.step2]
input_types: [fastq_short_paired_clean]
output_types: [assembly_fasta, assembly_graph]
applicable:
  species: [prokaryote, eukaryote_small]
  read_type: [short]
  mode: [de_novo]
container:
  image: staphb/spades:4.0.0
  pull_policy: if_not_present
resources:
  min:         { cpu: 4,  ram_gb: 8,  disk_gb: 20 }
  recommended: { cpu: 16, ram_gb: 64, disk_gb: 200 }
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  spades.py -1 {r1} -2 {r2} -o {out_dir} -t {cpu} -m {ram_gb}
  {extra_args}
citation: "Prjibelski 2020, PMID 32559359"
added: "2026-04-16"
last_reviewed: "2026-04-16"
source_repo: ablab/spades
