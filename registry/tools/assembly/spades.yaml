id: spades
name: SPAdes
version: "4.2.0"
category: assembly
stage: [genome_assembly.step2]
input_types: [fastq_short_paired_clean]
output_types: [assembly_fasta, assembly_graph]
applicable:
  species: [prokaryote, eukaryote_small]
  read_type: [short]
  mode: [de_novo]
container:
  image: staphb/spades:4.2.0
  pull_policy: if_not_present
  image_digest: sha256:2c79850a052320df8c6176322c2cd5b1577a4656460356a733592e6acba57552
resources:
  min: {cpu: 4, ram_gb: 8, disk_gb: 20}
  recommended: {cpu: 16, ram_gb: 64, disk_gb: 200}
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  spades.py -1 {r1} -2 {r2} -o {out_dir} -t {cpu} -m {ram_gb}
  {extra_args}
citation: "Prjibelski 2020, PMID 32559359"
