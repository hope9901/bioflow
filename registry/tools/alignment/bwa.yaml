id: bwa
name: BWA
version: "0.7.18"
category: alignment
stage: [genome_assembly.step2, chip_seq.step2, atac_seq.step2]
input_types: [fastq_short_paired_clean]
output_types: [sam, bam]
applicable:
  species: [any]
  read_type: [short]
  mode: [any]
container:
  image: quay.io/biocontainers/bwa:0.7.18--he4a0461_0
  pull_policy: if_not_present
resources:
  min:         { cpu: 4,  ram_gb: 8,  disk_gb: 20 }
  recommended: { cpu: 16, ram_gb: 32, disk_gb: 200 }
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  bwa mem -t {cpu} {bwa_index} {r1} {r2} > {out_dir}/aln.sam
references: []
citation: "Li & Durbin 2009, PMID 19451168"
added: "2026-05-15"
last_reviewed: "2026-05-15"
source_repo: lh3/bwa
