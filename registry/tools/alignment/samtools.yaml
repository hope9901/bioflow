id: samtools
name: samtools
version: "1.20"
category: alignment
stage:
  # NOTE: plain single-tool aligner BioContainers (bwa, bowtie2,
  # minimap2) do NOT bundle samtools — recipes that need a
  # ``aligner | samtools sort`` chain must use a combined image (a
  # mulled bwa+samtools / minimap2+samtools, or staphb/bowtie2).  This
  # entry is samtools as a standalone utility for ad-hoc BAM
  # filtering / coverage / view.
  - utility.bam_processing
input_types: [bam, sam]
output_types: [bam, bai]
applicable:
  species: [any]
  read_type: [short, long_hifi, long_ont, hybrid, any]
  mode: [any, de_novo, resequencing, peak_calling, wgbs, rrbs, differential, profiling]
container:
  image: quay.io/biocontainers/samtools:1.20--h50ea8bc_0
  pull_policy: if_not_present
  image_digest: sha256:d0ebd10e887e3ddd02d071f1ca7b649dc90dc6fb99a5ffd0f5ebf8611a1f92cc
resources:
  min: {cpu: 2, ram_gb: 2, disk_gb: 5}
  recommended: {cpu: 8, ram_gb: 8, disk_gb: 50}
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  samtools sort -@ {cpu} -o {out_dir}/sorted.bam {input_bam} &&
  samtools index -@ {cpu} {out_dir}/sorted.bam
citation: "Danecek 2021, PMID 33590861"
added: "2026-05-12"
last_reviewed: "2026-05-12"
