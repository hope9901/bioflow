id: bracken
name: bracken
version: "3.1"
category: metagenomics
stage: [metagenomics.step3]
input_types: [kraken2_report]
output_types: [bracken_report]
applicable:
  species: [any]
  read_type: [short]
  mode: [profiling]
container:
  image: quay.io/biocontainers/bracken:3.1--h9948957_0
  pull_policy: if_not_present
  image_digest: sha256:a951fb8ecb7aa9301513a96b87981aecb878aa798d0c3f0af476b3cbedd2f856
resources:
  min: {cpu: 2, ram_gb: 8, disk_gb: 10}
  recommended: {cpu: 4, ram_gb: 16, disk_gb: 20}
  gpu: false
  arch: [x86_64]
command_template: |
  bracken -d {kraken2_db} -i {out_dir}/kraken2_report.txt
  -o {out_dir}/bracken_output.txt -r {read_length} -l S -t {bracken_threshold}
references: []
citation: "Lu et al. 2017, PMID 28655956"
added: "2026-04-20"
last_reviewed: "2026-07-06"
