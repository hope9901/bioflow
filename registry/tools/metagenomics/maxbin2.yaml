id: maxbin2
name: MaxBin 2
version: "2.2.7"
category: metagenomics
stage: [metagenomics.step3]
input_types: [assembly_fasta, fastq_short_paired_clean]
output_types: [genome_bins]
applicable:
  species: [any]
  read_type: [short]
  mode: [profiling]
container:
  image: quay.io/biocontainers/maxbin2:2.2.7--he4a0461_8
  pull_policy: if_not_present
resources:
  min:         { cpu: 4,  ram_gb: 16, disk_gb: 30 }
  recommended: { cpu: 16, ram_gb: 64, disk_gb: 200 }
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  run_MaxBin.pl -contig {assembly_fasta}
                -reads {r1} -reads2 {r2}
                -out {out_dir}/maxbin -thread {cpu}
references: []
citation: "Wu 2016, PMID 26515820"
added: "2026-05-15"
last_reviewed: "2026-05-15"
