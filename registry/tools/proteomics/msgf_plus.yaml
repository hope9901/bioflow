resources:
  min: {cpu: 4, ram_gb: 8, disk_gb: 10}
  recommended: {cpu: 16, ram_gb: 32, disk_gb: 50}
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  msgf_plus -s {mzml_files} -d {fasta_db} -tda 1 -inst 0 -t 20ppm
  -o {out_dir}/msgf.mzid &&
  msgf_plus edu.ucsd.msjava.ui.MzIDToTsv -i {out_dir}/msgf.mzid -o {out_dir}/msgf.tsv
