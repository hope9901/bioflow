id: msgf_plus
name: MS-GF+
version: "2024.03.26"
category: proteomics
stage: [proteomics.step2]
input_types: [mzml, protein_fasta]
output_types: [mzid, psm_results]
applicable:
  species: [any]
  read_type: [ms_dda, ms_dia]
  mode: [dda]
container:
  image: quay.io/biocontainers/msgf_plus:2024.03.26--hdfd78af_0
  pull_policy: if_not_present
