id: xtandem
name: X!Tandem
version: "15.12.15.2"
category: proteomics
stage: [proteomics.step2]
input_types: [mzml, protein_fasta]
output_types: [pep_xml]
applicable:
  species: [any]
  read_type: [ms_dda]
  mode: [dda]
container:
  image: quay.io/biocontainers/xtandem:15.12.15.2--h4464bbb_11
  pull_policy: if_not_present
resources:
  min:         { cpu: 4,  ram_gb: 8,  disk_gb: 20 }
  recommended: { cpu: 16, ram_gb: 32, disk_gb: 100 }
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  tandem.exe {xtandem_xml_config}
references: []
citation: "Craig & Beavis 2004, PMID 14976030"
added: "2026-05-15"
last_reviewed: "2026-05-15"
