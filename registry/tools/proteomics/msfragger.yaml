id: msfragger
name: msfragger
version: "4.1"
category: proteomics
stage: [proteomics.step2]
input_types: [mzml]
output_types: [psm_tsv]
applicable:
  species: [any]
  read_type: [ms_dda, ms_dia]
  mode: [dda, dia]
container:
  image: fcyu/msfragger:4.1
  pull_policy: if_not_present
resources:
  min: {cpu: 8, ram_gb: 32, disk_gb: 50}
  recommended: {cpu: 32, ram_gb: 128, disk_gb: 200}
  gpu: false
  arch: [x86_64]
command_template: |
  java -Xmx{ram_gb}g -jar /MSFragger.jar {msfragger_params}
  --database_name {protein_db} --output_file_extension tsv {out_dir}/*.mzML
references: []
citation: "Kong et al. 2017, PMID 28394336"
added: "2026-04-20"
last_reviewed: "2026-05-15"
deprecated: true
deprecation_note: >
  No public Docker image — `fcyu/msfragger:4.1` is not on Docker Hub
  and MSFragger's license prohibits BioContainers redistribution.
  Recipes default to `comet` (open-source); to use MSFragger, the
  maintainer must build a local image after accepting the
  non-commercial license.
replaced_by: comet
