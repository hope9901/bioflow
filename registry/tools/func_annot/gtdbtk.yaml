id: gtdbtk
name: GTDB-Tk
version: "2.4.0"
category: func_annot
stage: [genome_assembly.step6, metagenomics.step3]
input_types: [assembly_fasta]
output_types: [taxonomy_tsv, classification]
applicable:
  species: [prokaryote]
  read_type: [any]
  mode: [any, profiling]
container:
  image: quay.io/biocontainers/gtdbtk:2.4.0--pyhdfd78af_1
  pull_policy: if_not_present
resources:
  min:         { cpu: 8,  ram_gb: 32, disk_gb: 100 }
  recommended: { cpu: 32, ram_gb: 128, disk_gb: 500 }
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  gtdbtk classify_wf --genome_dir {genome_dir} --out_dir {out_dir}
                     --cpus {cpu} --mash_db {gtdbtk_mash_db}
references: ["/refs/dbs/gtdbtk"]
citation: "Chaumeil 2022, PMID 35906921"
added: "2026-05-15"
last_reviewed: "2026-05-15"
source_repo: Ecogenomics/GTDBTk
