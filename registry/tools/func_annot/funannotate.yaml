  gpu: false
  arch: [x86_64, amd64]
command_template: |
  funannotate annotate --fasta {assembly_fasta} --out {out_dir}
              --species "{species}" --cpus {cpu}
references: ["/refs/dbs/funannotate"]
citation: "Palmer & Stajich 2020, funannotate (Zenodo)"
