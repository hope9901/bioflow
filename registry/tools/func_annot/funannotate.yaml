id: funannotate
name: funannotate
version: "1.8.17"
category: func_annot
stage: [genome_assembly.step6]
input_types: [assembly_fasta]
output_types: [structural_gff, functional_annotation_tsv, protein_faa]
applicable:
  species: [eukaryote, eukaryote_small, any]
  read_type: [any]
  mode: [any]
container:
  image: quay.io/biocontainers/funannotate:1.8.17--pyhdfd78af_5
  pull_policy: if_not_present
