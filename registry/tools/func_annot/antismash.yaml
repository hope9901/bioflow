id: antismash
name: antiSMASH
version: "7.1.0"
category: func_annot
stage: [genome_assembly.step6]
input_types: [assembly_fasta, structural_gff]
output_types: [bgc_html, bgc_genbank]
applicable:
  species: [prokaryote, eukaryote_small]
  read_type: [any]
  mode: [any]
container:
  image: antismash/standalone:7.1.0
  pull_policy: if_not_present
resources:
  min:         { cpu: 4,  ram_gb: 8,  disk_gb: 20 }
  recommended: { cpu: 16, ram_gb: 32, disk_gb: 100 }
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  antismash --cpus {cpu} --output-dir {out_dir}
            --genefinding-tool prodigal {assembly_fasta}
references: []
citation: "Blin 2023, PMID 37140037"
added: "2026-05-15"
last_reviewed: "2026-05-15"
source_repo: antismash/antismash
