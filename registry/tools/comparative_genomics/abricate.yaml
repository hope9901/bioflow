id: abricate
name: ABRicate
version: "1.4.0"
category: comparative_genomics
stage: [comparative_genomics.step5]
input_types: [assembly_fasta]
output_types: [resistance_table, virulence_table]
applicable:
  species: [prokaryote]
  read_type: [any]
  mode: [comparative]
container:
  image: staphb/abricate:1.4.0
  pull_policy: if_not_present
  image_digest: sha256:a3bbb5fb4c546e9beec5d32c74714b0f175481c2207f2f2b3546567b46118c78
resources:
  min: {cpu: 2, ram_gb: 2, disk_gb: 2}
  recommended: {cpu: 4, ram_gb: 4, disk_gb: 5}
  gpu: false
  arch: [x86_64]
command_template: |
  abricate --db {db} --threads {cpu} {assembly_fasta} > {out_dir}/{sample_id}.{db}.tsv
references: []
citation: "Seemann T, ABRicate, https://github.com/tseemann/abricate"
added: "2026-04-27"
last_reviewed: "2026-07-06"
