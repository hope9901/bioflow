id: skani
name: skani
version: "0.2.2"
category: comparative_genomics
stage: [comparative_genomics.step2]
input_types: [assembly_fasta]
output_types: [ani_matrix]
applicable:
  species: [any]
  read_type: [any]
  mode: [comparative]
container:
  image: quay.io/biocontainers/skani:0.2.2--h4ac6f70_0
  pull_policy: if_not_present
resources:
  min:         { cpu: 2,  ram_gb: 8,  disk_gb: 10 }
  recommended: { cpu: 32, ram_gb: 32, disk_gb: 100 }
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  skani triangle -t {cpu} {genome_files}
        > {out_dir}/skani_triangle.tsv
references: []
citation: "Shaw & Yu 2023, PMID 37419955"
added: "2026-05-15"
last_reviewed: "2026-05-15"
source_repo: bluenote-1577/skani
