id: prokka_comparative
name: Prokka (comparative-genomics consistent re-annotation)
version: "1.14.6"
category: comparative_genomics
stage: [comparative_genomics.step1]
input_types: [assembly_fasta]
output_types: [annotation_gff, protein_faa]
applicable:
  species: [prokaryote]
  read_type: [any]
  mode: [comparative]
container:
  image: staphb/prokka:1.14.6
  pull_policy: if_not_present
resources:
  min: {cpu: 2, ram_gb: 4, disk_gb: 5}
  recommended: {cpu: 8, ram_gb: 16, disk_gb: 20}
  gpu: false
  arch: [x86_64]
command_template: |
  prokka --outdir {out_dir}/{sample_id} --prefix {sample_id} --cpus {cpu}
  --kingdom Bacteria --genus Dickeya --usegenus --force {assembly_fasta}
references: []
citation: "Seemann 2014, PMID 24642063"
added: "2026-04-27"
last_reviewed: "2026-04-27"
