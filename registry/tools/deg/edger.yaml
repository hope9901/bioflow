id: edger
name: edgeR
version: "4.2.0"
category: deg
stage: [rnaseq_deg.step3]
input_types: [count_matrix, sample_sheet]
output_types: [deg_table, deg_plots]
applicable:
  species: [any]
  read_type: [any]
  mode: [any]
container:
  image: quay.io/biocontainers/bioconductor-edger:4.8.2--r45h01b2380_0
  pull_policy: if_not_present
  image_digest: sha256:3d918aca6aee52981f097b61dfa4f50adbb624a83bc03f396c6298b2a71bc38c
resources:
  min: {cpu: 2, ram_gb: 4, disk_gb: 2}
  recommended: {cpu: 4, ram_gb: 16, disk_gb: 5}
  gpu: false
  arch: [x86_64, amd64]
command_template: |
  Rscript -e "
    library(edgeR)
    counts <- read.table('{count_matrix}', header=TRUE, row.names=1)
    coldata <- read.csv('{sample_sheet}')
    group <- factor(coldata\$condition)
    y <- DGEList(counts=round(counts), group=group)
    y <- calcNormFactors(y)
    design <- model.matrix(~group)
    y <- estimateDisp(y, design)
    fit <- glmQLFit(y, design)
    res <- glmQLFTest(fit)
    write.csv(topTags(res, n=Inf)\$table,
              file='{out_dir}/deg_results.tsv', quote=FALSE)
  "
citation: "Robinson 2010, PMID 19910308"
added: "2026-04-16"
last_reviewed: "2026-04-16"
