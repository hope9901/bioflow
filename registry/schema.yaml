$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://bioflow.local/registry/tool.schema.yaml"
title: bioflow tool registry entry
type: object
required:
  - id
  - name
  - version
  - category
  - stage
  - applicable
  - container
  - resources
  - command_template
additionalProperties: false
properties:
  id:          { type: string, pattern: "^[a-z0-9_]+$" }
  name:        { type: string }
  version:     { type: string }
  category:
    type: string
    enum:
      # Genomics / assembly
      - qc
      - assembly
      - assembly_qc
      - repeat
      - struct_annot
      - func_annot
      # RNA-seq
      - rnaseq_align
      - deg
      - enrichment
      # Multi-omics expansion
      - alignment        # general-purpose aligners (Bowtie2, BWA)
      - variant_calling  # SNP / indel / SV calling + annotation
      - metagenomics     # taxonomic + functional profiling
      - single_cell      # scRNA-seq, scATAC-seq
      - epigenomics      # ChIP-seq, ATAC-seq, methylation
      - proteomics       # LC-MS/MS proteomics
      - metabolomics     # future
      - comparative_genomics   # ANI, pangenome, phylogenetics
  stage:
    type: array
    items: { type: string }
    minItems: 1
  input_types:  { type: array, items: { type: string } }
  output_types: { type: array, items: { type: string } }
  applicable:
    type: object
    additionalProperties: false
    properties:
      species:
        type: array
        items:
          type: string
          enum: [prokaryote, eukaryote, eukaryote_small, any]
      read_type:
        type: array
        items:
          type: string
          enum:
            - short
            - long_hifi
            - long_ont
            - hybrid
            - any
            # Proteomics
            - ms_dda
            - ms_dia
      mode:
        type: array
        items:
          type: string
          enum:
            - de_novo
            - resequencing
            - any
            # Metagenomics
            - profiling
            # Epigenomics
            - peak_calling
            - differential
            # Methylation
            - wgbs
            - rrbs
            # Proteomics
            - dda
            - dia
            # Comparative genomics
            - comparative
  container:
    type: object
    required: [image]
    additionalProperties: false
    properties:
      image:       { type: string }
      pull_policy: { type: string, enum: [always, if_not_present, never] }
      # Optional but strongly recommended — content-addressed image
      # digest pinned via `scripts/pin_digests.py`.  When present the
      # runner uses ``image@image_digest`` instead of ``image:tag`` so a
      # silently-retagged upstream image cannot change recipe results.
      # Pin format is the OCI manifest digest, e.g.
      #   sha256:0d3c7a4f….  CI warns on missing digests.
      image_digest:
        type: string
        pattern: "^sha256:[0-9a-f]{64}$"
  resources:
    type: object
    required: [min, recommended]
    additionalProperties: false
    properties:
      min:
        type: object
        required: [cpu, ram_gb]
        properties:
          cpu:     { type: integer, minimum: 1 }
          ram_gb:  { type: number, minimum: 0 }
          disk_gb: { type: number, minimum: 0 }
      recommended:
        type: object
        required: [cpu, ram_gb]
        properties:
          cpu:     { type: integer, minimum: 1 }
          ram_gb:  { type: number, minimum: 0 }
          disk_gb: { type: number, minimum: 0 }
      gpu:         { type: boolean }
      arch:
        type: array
        items: { type: string, enum: [x86_64, amd64, arm64, aarch64] }
  command_template: { type: string }
  references:      { type: array, items: { type: string } }
  citation:        { type: string }
  added:           { type: string, format: date }
  last_reviewed:   { type: string, format: date }
  # Optional — owner/repo for the weekly release-watch (T2 cadence).
  # When present, update/release_watch.py polls
  # https://api.github.com/repos/<source_repo>/releases/latest and files
  # a candidate YAML draft if the latest tag is newer than `version`.
  source_repo:
    type: string
    pattern: "^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$"
  # Optional — explain why a version is intentionally NOT bumped to the
  # latest upstream (referenced by `bioflow update` review docs).
  pin_reason:    { type: string }
  # Optional — flag a tool as deprecated.  Recipes are expected to stop
  # using it; YAML stays in-tree for reproducibility / rollback.
  deprecated:        { type: boolean }
  deprecation_note:  { type: string }
  replaced_by:       { type: string }
