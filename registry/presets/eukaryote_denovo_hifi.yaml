id: eukaryote_denovo_hifi
pipeline: genome_assembly
description: >
  Eukaryote de-novo assembly from PacBio HiFi long reads.
  filtlong → hifiasm → BUSCO → Earl Grey (repeat) →
  BRAKER3 (structural) → eggNOG-mapper (functional).
  Best-practice pipeline for chromosome-level eukaryote assemblies.
applies_to:
  species: [eukaryote, eukaryote_small]
  read_type: [long_hifi]
  mode: [de_novo]
stages:
  - stage_id: genome_assembly.step1
    tool_id: filtlong

  - stage_id: genome_assembly.step2
    tool_id: hifiasm

  - stage_id: genome_assembly.step3
    tool_id: busco

  - stage_id: genome_assembly.step4
    tool_id: earlgrey

  - stage_id: genome_assembly.step5
    tool_id: braker3

  - stage_id: genome_assembly.step6
    tool_id: eggnog_mapper
