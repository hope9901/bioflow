id: atac_seq_standard
pipeline: atac_seq
recipe: atac_seq         # Python execution path equivalent
description: |
  Standard ATAC-seq workflow: TrimGalore QC → Bowtie2 alignment → MACS3 peak
  calling → deepTools coverage tracks → TOBIAS footprinting and motif analysis.
  Identifies open chromatin regions and transcription factor binding sites.
applies_to:
  species: [any]
  read_type: [short]
  mode: [peak_calling]
stages:
  - stage_id: atac_seq.step1
    tool_id: trimgalore
  - stage_id: atac_seq.step2
    tool_id: bowtie2
  - stage_id: atac_seq.step3
    tool_id: macs3
  - stage_id: atac_seq.step4
    tool_id: deeptools
  - stage_id: atac_seq.step5
    tool_id: tobias
