name: Nightly recipe smoke

# Real-container smoke tests for the recipe matrix.  Runs once a day at
# 03:00 UTC and on manual dispatch.  Failures are loud (workflow goes red
# in the README badge) but never block PR merges — see ci.yml for the
# unit-test gate.

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

# Opt into the Node 24 runtime ahead of the 2026-06-16 forced switch so
# the v4/v5 actions stop emitting Node 20 deprecation warnings.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  smoke-matrix:
    name: Recipe smoke matrix
    runs-on: ubuntu-latest
    # Each recipe pulls 50–600 MB and runs for ~30s; ~10 entries fits well
    # inside this limit even on a cold runner.
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Confirm Docker is up on the runner
        run: |
          docker --version
          docker info | head -20

      - name: Install bioflow with dev extras
        run: pip install -e ".[dev]"

      - name: Run smoke matrix (real BioContainers)
        env:
          # The smoke matrix is Docker-gated; reduce log noise.
          BIOFLOW_LOG_LEVEL: INFO
        run: |
          python -m pytest tests/integration/test_recipe_smoke_matrix.py \
            -v -m docker \
            --junitxml=reports/smoke.xml

      - name: Run full-pipeline e2e (all 9 recipes with committed fixtures)
        env:
          BIOFLOW_LOG_LEVEL: INFO
        run: |
          python -m pytest tests/integration/test_full_pipeline_e2e.py \
            -v -m docker \
            --junitxml=reports/full_e2e.xml

      - name: Upload junit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-junit
          path: reports/*.xml

      - name: Fail the job on red results
        if: failure()
        run: |
          echo "::error::Nightly recipe smoke matrix failed — inspect the junit"
          echo "         artifact and the per-recipe stderr in the log above."
          exit 1

  image-capabilities:
    name: Image capability guard
    runs-on: ubuntu-latest
    # Pulls every recipe image to verify each ships the tools its stages
    # invoke.  BIOFLOW_PRUNE_IMAGES=1 ``docker rmi``s each image right
    # after its check so peak disk stays near the largest single image.
    # Its own runner (separate disk) keeps it clear of the e2e job above.
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Confirm Docker is up on the runner
        run: docker --version

      - name: Install bioflow with dev extras
        run: pip install -e ".[dev]"

      - name: Verify every stage image ships the tools it invokes
        env:
          BIOFLOW_PRUNE_IMAGES: "1"
        run: |
          python -m pytest tests/integration/test_image_capabilities.py \
            -v -m docker \
            --junitxml=reports/image_capabilities.xml

      - name: Upload junit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: image-capabilities-junit
          path: reports/*.xml

      - name: Fail the job on red results
        if: failure()
        run: |
          echo "::error::An image is missing a tool one of its stages invokes."
          echo "         See the failing parametrization for image + tool + recipe."
          exit 1
