name: Docs

# Build the MkDocs site and deploy it to GitHub Pages on every push to
# main.  The tools/recipes reference pages are regenerated from the
# registry first so the published docs always match the code.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'web/**'
      - 'mkdocs.yml'
      - 'registry/**'
      - 'bioflow/recipes/**'
      - 'scripts/gen_docs.py'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs of this group
concurrency:
  group: pages
  cancel-in-progress: true

# Opt into the Node 24 runtime ahead of the 2026-06-16 forced switch so
# the v3/v4/v5 actions stop emitting Node 20 deprecation warnings.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install bioflow + docs deps
        run: pip install -e ".[docs]"

      - name: Regenerate reference pages from the registry
        run: python scripts/gen_docs.py

      - name: Build site (strict)
        run: mkdocs build --strict

      - name: Use the landing page as the site home
        # The promotional landing (web/index.html) becomes the Pages root;
        # the MkDocs pages stay at their sub-paths (/install/, /quickstart/,
        # /reference/…) and the landing links into them.  web/assets/ carries
        # the OG social image + screenshots.
        run: |
          cp web/index.html site/index.html
          mkdir -p site/assets && cp -r web/assets/. site/assets/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
