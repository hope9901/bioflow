name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt into the Node 24 runtime ahead of the 2026-06-16 forced switch so
# the v4/v5 actions stop emitting Node 20 deprecation warnings.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest tests/unit -q --tb=short

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check .

  typecheck:
    # Blocking: the bioflow package type-checks clean under mypy
    # (--ignore-missing-imports for the un-stubbed docker / anthropic /
    # openai SDKs).  Keep it that way — a new type error fails CI.
    name: Type check (mypy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install mypy
        run: pip install -e ".[dev]" && pip install types-PyYAML types-requests

      - name: Run mypy
        run: mypy bioflow --ignore-missing-imports

  registry-schema:
    name: Validate registry YAMLs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Validate all tool YAMLs against schema
        run: |
          python - <<'EOF'
          import yaml, jsonschema, pathlib, sys

          schema = yaml.safe_load(
              pathlib.Path("registry/schema.yaml").read_text(encoding="utf-8")
          )
          errors = []
          for p in pathlib.Path("registry/tools").rglob("*.yaml"):
              doc = yaml.safe_load(p.read_text(encoding="utf-8"))
              # strip update_meta before validating
              doc.pop("update_meta", None)
              try:
                  jsonschema.validate(doc, schema)
              except jsonschema.ValidationError as e:
                  errors.append(f"{p}: {e.message}")
          if errors:
              for err in errors:
                  print("FAIL:", err, file=sys.stderr)
              sys.exit(1)
          print(f"OK — {len(list(pathlib.Path('registry/tools').rglob('*.yaml')))} tool YAMLs validated")
          EOF

  docs-fresh:
    # The README tools table + docs/reference/{tools,recipes}.md are generated
    # from the registry by scripts/gen_docs.py.  Fail if they drifted, so a
    # tool added/changed without regenerating can't ship stale docs.
    name: Generated docs up to date
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Regenerate docs from the registry
        run: python scripts/gen_docs.py

      - name: Fail if README / reference docs are stale
        run: |
          if ! git diff --quiet -- README.md docs/reference/tools.md docs/reference/recipes.md; then
            echo "::error::Generated docs are stale — run 'python scripts/gen_docs.py' and commit."
            git --no-pager diff -- README.md docs/reference/tools.md docs/reference/recipes.md
            exit 1
          fi
          echo "OK — README + reference docs match the registry."

  digest-audit:
    # Now blocking: every *active* tool must carry an image_digest
    # (deprecated tools are skipped — their upstream images are gone by
    # definition).  This keeps the registry fully content-addressed so a
    # silently-retagged or GC'd upstream image can never change results.
    name: Container digest pin audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Require every active tool to be digest-pinned
        run: python scripts/pin_digests.py --audit

  io-contracts:
    # Each tool declares the data formats it consumes/produces (input_types /
    # output_types).  registry/io_contracts.json snapshots every tool's
    # (version, inputs, outputs).  A version bump that also changes a tool's I/O
    # contract can break a downstream recipe stage, so this fails until the
    # snapshot is regenerated — surfacing the drift + the affected recipes so a
    # human re-verifies them before the bump ships.
    name: I/O contract freshness
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Fail if the I/O contract snapshot is stale
        run: python scripts/io_contracts.py check
