id: bustools
name: bustools
version: 0.45.1
category: single_cell
stage:
- scrna_seq.step1
input_types:
- bus_file
output_types:
- count_matrix
applicable:
  species:
  - eukaryote
  - eukaryote_small
  - any
  read_type:
  - short
  mode:
  - any
container:
  image: quay.io/biocontainers/bustools:0.45.1
  pull_policy: if_not_present
resources:
  min:
    cpu: 2
    ram_gb: 8
    disk_gb: 20
  recommended:
    cpu: 16
    ram_gb: 32
    disk_gb: 100
  gpu: false
  arch:
  - x86_64
  - amd64
command_template: "bustools sort -t {cpu} -o {out_dir}/sorted.bus {input_bus} &&\n\
  bustools correct -w {whitelist} -o {out_dir}/corrected.bus {out_dir}/sorted.bus\
  \ &&\nbustools count --genecounts -o {out_dir}/counts\n               -g {t2g} -e\
  \ {ec} -t {transcripts} {out_dir}/corrected.bus\n"
references: []
citation: Melsted 2019, PMID 31133686
