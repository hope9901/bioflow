id: raven
name: Raven
version: 1.8.3
category: assembly
stage:
- genome_assembly.step2
input_types:
- fastq_long_ont
- fastq_long_pacbio
output_types:
- assembly_fasta
applicable:
  species:
  - prokaryote
  - eukaryote_small
  read_type:
  - long_ont
  - long_hifi
  mode:
  - de_novo
container:
  image: quay.io/biocontainers/raven-assembler:1.8.3
  pull_policy: if_not_present
resources:
  min:
    cpu: 4
    ram_gb: 16
    disk_gb: 30
  recommended:
    cpu: 16
    ram_gb: 64
