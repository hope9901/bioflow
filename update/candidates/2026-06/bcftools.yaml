id: bcftools
name: bcftools
version: 1.23.1
category: variant_calling
stage:
- variant_calling.step2
- variant_calling.step3
input_types:
- bam
- vcf
- reference_fasta
output_types:
- vcf
applicable:
  species:
  - any
  read_type:
  - short
  - long_ont
  - long_hifi
  mode:
  - resequencing
container:
  image: quay.io/biocontainers/bcftools:1.23.1
  pull_policy: if_not_present
resources:
  min:
    cpu: 2
    ram_gb: 4
    disk_gb: 20
  recommended:
    cpu: 8
    ram_gb: 16
    disk_gb: 100
  gpu: false
  arch:
  - x86_64
  - amd64
command_template: 'bcftools mpileup -f {reference_fasta} {input_bam} |

  bcftools call -mv -Oz -o {out_dir}/{sample_id}.vcf.gz &&

  bcftools index {out_dir}/{sample_id}.vcf.gz

  '
