id: scanpy
name: scanpy
version: 1.12.2
category: single_cell
stage:
- scrna_seq.step2
- scrna_seq.step3
- scrna_seq.step4
input_types:
- count_matrix
output_types:
- h5ad
applicable:
  species:
  - eukaryote
  - eukaryote_small
  - prokaryote
  read_type:
  - short
  mode:
  - de_novo
container:
  image: quay.io/biocontainers/scanpy:1.12.2
  pull_policy: if_not_present
  image_digest: sha256:9cbc28b321d7c930c930ab871bab9c8c691cdf52c32e0e4995951284e609ad2e
resources:
  min:
    cpu: 4
    ram_gb: 16
    disk_gb: 10
  recommended:
    cpu: 16
    ram_gb: 64
    disk_gb: 50
  gpu: false
  arch:
  - x86_64
command_template: 'python -c "

  import scanpy as sc;

  adata=sc.read_10x_mtx(''{count_matrix_dir}'');

  sc.pp.filter_cells(adata, min_genes=200);

  sc.pp.filter_genes(adata, min_cells=3);

  sc.pp.normalize_total(adata);

  sc.pp.log1p(adata);

  sc.pp.highly_variable_genes(adata);

  sc.tl.pca(adata);

  sc.pp.neighbors(adata);

  sc.tl.umap(adata);

  sc.tl.leiden(adata);

  sc.tl.rank_genes_groups(adata,''leiden'');

  adata.write(''{out_dir}/analyzed.h5ad'')"

  '
